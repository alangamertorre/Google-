<!DOCTYPE html>
<html lang="cat">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva pestaña</title>
    <style>
        body {
            margin: 0%;
            padding: 0%;
        }

        .frame {
            position: fixed;
            width: 100%;
            height: 100%;
            border: none;
        }

        p {
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: red;
        }
    </style>
</head>

<body>
    <audio>
        <source src="No abrir.mp3" loop>
    </audio>
    <iframe src="google-clone/index.html" class="frame"></iframe>
    <p>Haz click</p>
    <script>
        const audio = document.querySelector('audio');
        const p = document.querySelector('p');
        p.addEventListener('click', () => {
            audio.play();
            p.style.display = 'none';
        });
    </script>
</body>

</html>
